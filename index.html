<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    #map { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script src="https://api-maps.yandex.ru/2.1/?lang=ru_RU"></script>
  <script>
    var params = new URLSearchParams(location.search);
    var lat = parseFloat(params.get('lat')) || 41.311;
    var lon = parseFloat(params.get('lon')) || 69.279;

    ymaps.ready(function () {
      var map = new ymaps.Map('map', {
        center: [lat, lon],
        zoom: 16,
        controls: [],
      }, {
        suppressMapOpenBlock: true,
      });

      var placemark = new ymaps.Placemark([lat, lon], {}, {
        draggable: true,
        iconLayout: 'default#imageWithContent',
        iconImageHref: 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="36" height="48" viewBox="0 0 36 48"><path d="M18 0C8.06 0 0 8.06 0 18c0 13.5 18 30 18 30s18-16.5 18-30C36 8.06 27.94 0 18 0z" fill="%23002f34"/><circle cx="18" cy="18" r="7" fill="%23fff"/></svg>'),
        iconImageSize: [36, 48],
        iconImageOffset: [-18, -48],
        iconContentOffset: [0, 0],
      });

      map.geoObjects.add(placemark);

      function sendCoords(coords) {
        window.parent.postMessage({
          type: 'map-pin-moved',
          lat: coords[0],
          lon: coords[1],
        }, '*');
      }

      placemark.events.add('dragend', function () {
        sendCoords(placemark.geometry.getCoordinates());
      });

      // Long press (500ms) to move pin — avoids accidental clicks
      var pressTimer = null;
      var pressCoords = null;

      map.events.add('mousedown', function (e) {
        pressCoords = e.get('coords');
        pressTimer = setTimeout(function () {
          placemark.geometry.setCoordinates(pressCoords);
          sendCoords(pressCoords);
          pressTimer = null;
        }, 500);
      });

      map.events.add('mouseup', function () {
        if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
      });

      map.events.add('mousemove', function () {
        if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
      });
    });
  </script>
</body>
</html>
